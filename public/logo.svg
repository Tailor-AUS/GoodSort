<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 430 62" fill="none">
  <!-- The Good Sort — 3A: Yellow lid, cream body with yellow border, 4 CDS squares -->
  <!-- Lid -->
  <rect x="0" y="0" width="58" height="10" rx="6" fill="#eab308"/>
  <!-- Body (cream fill, yellow border, rounded bottom) -->
  <rect x="3" y="12" width="52" height="42" rx="7" fill="#fefce8" stroke="#fde047" stroke-width="2"/>
  <!-- 4 CDS stream squares -->
  <rect x="9" y="17" width="19" height="15" rx="3" fill="#3b82f6"/>
  <rect x="31" y="17" width="19" height="15" rx="3" fill="#14b8a6"/>
  <rect x="9" y="35" width="19" height="15" rx="3" fill="#f59e0b"/>
  <rect x="31" y="35" width="19" height="15" rx="3" fill="#16a34a"/>
  <!-- Wordmark -->
  <text x="76" y="44" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="38" font-weight="800" letter-spacing="-2" fill="#0f172a">the good sort</text>
</svg>
