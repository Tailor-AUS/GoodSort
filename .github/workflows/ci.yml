name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    name: Build Next.js
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${{ secrets.NEXT_PUBLIC_GOOGLE_MAPS_API_KEY }}

  build-backend:
    runs-on: ubuntu-latest
    name: Build .NET API
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x
      - run: dotnet restore src/GoodSort.sln
      - run: dotnet build src/GoodSort.sln --no-restore -c Release
